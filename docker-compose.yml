services:
  service:
    build: ./service
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      wordpress:
        condition: service_started
    networks:
      - pipeline

  wordpress:
    image: wordpress:6.7.2-php8.3-apache
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      CONTENT_PIPELINE_SECRET: ${WEBHOOK_SECRET}
      WORDPRESS_CONFIG_EXTRA: "define('CONTENT_PIPELINE_SECRET', getenv('CONTENT_PIPELINE_SECRET'));"
    volumes:
      - ./wordpress/plugins/content-pipeline:/var/www/html/wp-content/plugins/content-pipeline
      - ./wordpress/themes/tela-theme:/var/www/html/wp-content/themes/tela-theme
      - wp_data:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - pipeline

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - pipeline

volumes:
  wp_data:
  mysql_data:

networks:
  pipeline:
    driver: bridge
